server:
  port: "8080"
  host: "0.0.0.0"
  read_timeout: 30
  write_timeout: 30

websocket:
  port: "8081"

database:
  host: "localhost"
  port: "5432"
  user: "cryptohub"
  password: "password"
  name: "cryptohub"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "your-secret-key-change-in-production"
  access_token_ttl: "24h"
  refresh_token_ttl: "168h" # 7 days

exchanges:
  binance:
    base_url: "https://api.binance.com"
    testnet_url: "https://testnet.binance.vision"
  okx:
    base_url: "https://www.okx.com"
  bybit:
    base_url: "https://api.bybit.com"

notification:
  telegram:
    bot_token: ""
    webhook_url: ""
  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: ""
    password: ""
    from: "noreply@cryptohub.com"
  discord:
    webhook_url: ""

logging:
  level: "info"
  format: "json"
  output: "stdout"

security:
  rate_limit:
    requests_per_minute: 100
    burst: 20
  cors:
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["*"]
  turnstile:
    secret_key: ""  # Set via SECURITY_TURNSTILE_SECRET_KEY env var

features:
  enable_paper_trading: true
  enable_live_trading: false
  enable_backtesting: true
  max_strategies_per_user: 10
  max_positions_per_strategy: 50